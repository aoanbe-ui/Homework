<!DOCTYPE html>
<html lang="en">
<head>
    <title>My Basic Website</title>

    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #f4f4f4;
        }

        h1 {
            color: darkblue;
        }

        .highlight {
            color: green;
            font-weight: bold;
        }

        #main-header {
            text-align: center;
            background-color: lightgray;
            padding: 15px;
        }
    </style>
</head>

<body>

<nav>
    <a href="#home">Home</a> |
    <a href="#about">About</a> |
    <a href="#contact">Contact</a>
</nav>

<header id="main-header">
    <h1>Welcome!</h1>
</header>

<section id="home">
    <h2>Home</h2>

    <p style="color: red;">Hello.</p>

    <p class="highlight">Nice to meet you.</p>

    <img src="images/sample.jpg" alt="Sample Image" width="200">

</section>

    <ol>
        <li>Wake up</li>
        <li>Study</li>
        <li>Sleep</li>
    </ol>
</section>

<section id="about">
    <h2>Sample Table</h2>

    <table border="1">
        <tr>
            <th>Name</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Anastasiia</td>
            <td>19</td>
        </tr>
    </table>
</section>

<section id="contact">
    <h2>Contact Form</h2>

    <form>
        <label>Name:</label><br>
        <input type="text"><br><br>

        <label>Email:</label><br>
        <input type="email"><br><br>

        <label>Message:</label><br>
        <textarea></textarea><br><br>

        <input type="submit" value="Submit">
    </form>
</section>

</body>
</html>
